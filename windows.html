<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aluminium Windows — Premium Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --burgundy: #6b1a1a;
      --burgundy-dark: #3a0a0a;
      --gold: #c8a07a;
      --gold-light: #e8d0b8;
      --cream: #f7f3ee;
      --white: #ffffff;
      --charcoal: #1e1a17;
      --muted: #8a7a6a;
      --border: rgba(200,160,122,0.2);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--white);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      overflow: hidden;
      background: var(--burgundy-dark);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('hero.png') center/cover no-repeat;
      transform-origin: center;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }

    @keyframes heroZoom {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,6,6,0.65) 0%,
        rgba(20,6,6,0.45) 50%,
        rgba(20,6,6,0.75) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 80px 6% 80px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.9s 0.2s both;
    }
    .hero-label span {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
    }
    .hero-label::before {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--gold);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 9vw, 110px);
      font-weight: 300;
      color: var(--white);
      line-height: 0.95;
      letter-spacing: -1px;
      margin-bottom: 28px;
      animation: fadeUp 0.9s 0.35s both;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    .hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      animation: fadeUp 0.9s 0.55s both;
    }

    .hero-desc {
      max-width: 480px;
      font-size: 16px;
      color: rgba(255,255,255,0.65);
      line-height: 1.75;
      font-weight: 300;
    }

    .hero-meta {
      display: flex;
      gap: 40px;
      flex-shrink: 0;
    }
    .hero-stat { text-align: right; }
    .hero-stat strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 400;
      color: var(--gold);
    }
    .hero-stat span {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .gallery-section { padding: 100px 6%; background: var(--cream); }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 60px; gap: 32px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 4vw, 46px);
      font-weight: 400;
      color: var(--charcoal);
    }

    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .product-item { position: relative; overflow: hidden; aspect-ratio: 3/4; }

    .product-item img { width: 100%; height: 100%; object-fit: cover; }

  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-label">
      <span>Premium Aluminium Collection</span>
    </div>
    <h1>Aluminium<br><em>Windows</em></h1>
    <div class="hero-bottom">
      <p class="hero-desc">
        Strong and stylish aluminium windows engineered for lasting durability and modern living. Available in custom designs, bespoke dimensions, and a full range of premium anodised finishes.
      </p>
    </div>
  </div>
</section>

<section class="gallery-section">
  <div class="section-header">
    <h2 class="section-title">Crafted for Every<br>Space & Style</h2>
  </div>

  <div class="product-grid">

    <div class="product-item">
      <img src="window1.png" alt="Window 1">
    </div>
    <div class="product-item">
      <img src="window2.png" alt="Window 2">
    </div>
    <div class="product-item">
      <img src="window3.png" alt="Window 3">
    </div>
    <div class="product-item">
      <img src="window4.png" alt="Window 4">
    </div>
    <div class="product-item">
      <img src="window5.png" alt="Window 5">
    </div>
    <div class="product-item">
      <img src="window6.png" alt="Window 6">
    </div>
    <div class="product-item">
      <img src="window7.png" alt="Window 7">
    </div>
    <div class="product-item">
      <img src="window8.png" alt="Window 8">
    </div>
    <div class="product-item">
      <img src="window9.png" alt="Window 9">
    </div>
    <div class="product-item">
      <img src="window10.png" alt="Window 10">
    </div>
    <div class="product-item">
      <img src="window11.png" alt="Window 11">
    </div>
    <div class="product-item">
      <img src="window12.png" alt="Window 12">
    </div>
    <div class="product-item">
      <img src="window13.png" alt="Window 13">
    </div>
    <div class="product-item">
      <img src="window14.png" alt="Window 14">
    </div>
    <div class="product-item">
      <img src="window15.png" alt="Window 15">
    </div>

  </div>
</section>

</body>
</html>
